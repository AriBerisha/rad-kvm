# Installed to /etc/modprobe.d/q6a-kvm-v4l2loopback.conf
# /dev/video20 = single-planar loopback that ustreamer reads (the camss RDI node
# is multiplanar, which ustreamer can't open). 8 buffers avoids the
# "buffer already used" race.
options v4l2loopback video_nr=20 card_label=q6a-kvm exclusive_caps=1 max_buffers=8
